<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QR code</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <div class="hero center">
      <h1>Σκάναρε για ραντεβού</h1>
      <p class="muted">Δείξε αυτό το QR στους πελάτες σου</p>
    </div>
    <div class="section">
      <div class="card qr-wrap">
        <img id="qr" src="/api/qr.png" alt="QR" />
        <div class="url" id="url">—</div>
      </div>
      <div class="no-print" style="margin-top:14px">
        <button class="btn full" onclick="window.print()">🖨 Εκτύπωση</button>
      </div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const shop = params.get('shop');
    const url = shop ? `${location.origin}/?shop=${encodeURIComponent(shop)}` : `${location.origin}/`;
    document.getElementById('qr').src = `/api/qr.png?url=${encodeURIComponent(url)}`;
    document.getElementById('url').textContent = url;
  </script>
</body>
</html>
